<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Kredia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-page">
        <!-- Visual Section -->
        <div class="auth-visual">
            <div class="auth-visual-content">
                <h2>New Password.<br>Stronger Protection.</h2>
                <p>Create a robust password to ensure your financial data remains under high-fidelity encryption. Use a
                    mix of characters for maximum security.</p>
            </div>
        </div>

        <!-- content Section -->
        <div class="auth-content">
            <div class="auth-form-wrapper">
                <header class="auth-header">
                    <img src="/images/logo.png" alt="Kredia" class="auth-logo">
                    <h3>Set New Password</h3>
                    <p>Enter your new password below. Make it strong!</p>
                </header>

                <form id="resetPasswordForm" class="auth-form">
                    <div class="form-group-modern">
                        <label for="password">New Password</label>
                        <input type="password" id="password" class="input-modern" placeholder="••••••••" required>
                    </div>

                    <div class="form-group-modern">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="input-modern" placeholder="••••••••"
                            required>
                    </div>

                    <div id="statusMessage" style="text-align: left; margin-bottom: 24px;"></div>

                    <button type="submit" class="btn-auth">Reset Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            window.location.href = '/login.html';
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusMessage = document.getElementById('statusMessage');

            if (password !== confirmPassword) {
                statusMessage.innerHTML = `<p style="color: var(--error-color);">Passwords do not match.</p>`;
                return;
            }

            if (password.length < 8) {
                statusMessage.innerHTML = `<p style="color: var(--error-color);">Password must be at least 8 characters.</p>`;
                return;
            }

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();
                if (response.ok) {
                    statusMessage.innerHTML = `<p style="color: var(--success-color);">${data.message} Redirecting to login...</p>`;
                    setTimeout(() => window.location.href = '/login.html', 3000);
                } else {
                    statusMessage.innerHTML = `<p style="color: var(--error-color);">${data.error || 'Invalid or expired token.'}</p>`;
                }
            } catch (error) {
                statusMessage.innerHTML = `<p style="color: var(--error-color);">An error occurred. Please try again later.</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
