<div class="auth-page login-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="brand-logo">●</span>
        <h1>Sign in to KREDIA</h1>
        <p class="auth-tagline">Access your financial dashboard</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
          <!-- Error Alert -->
          <div class="alert alert-error" *ngIf="error" role="alert">
            <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>{{ error }}</span>
          </div>

          <!-- Email Field -->
          <div class="form-field">
            <label for="email">Email Address</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="your@email.com"
              class="form-input"
              autocomplete="email"
            />
            <span class="field-error" *ngIf="form.get('email')?.hasError('required') && form.get('email')?.touched">
              Email is required
            </span>
            <span class="field-error" *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched">
              Please enter a valid email
            </span>
          </div>

          <!-- Password Field -->
          <div class="form-field">
            <div class="form-field-row">
              <label for="password">Password</label>
              <a routerLink="/forgot-password" class="forgot-link">Forgot?</a>
            </div>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="form-input"
              autocomplete="current-password"
            />
            <span class="field-error" *ngIf="form.get('password')?.hasError('required') && form.get('password')?.touched">
              Password is required
            </span>
            <span class="field-error" *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched">
              Password must be at least 4 characters
            </span>
          </div>

          <!-- Remember Me -->
          <div class="remember-me">
            <input id="remember" type="checkbox" />
            <label for="remember">Keep me signed in</label>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="btn-primary btn-full"
            [disabled]="loading || form.invalid"
            [class.btn-loading]="loading"
          >
            <span *ngIf="!loading">Sign in</span>
            <span *ngIf="loading">
              <span class="spinner"></span> Signing in...
            </span>
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <!-- OAuth Buttons -->
        <div class="oauth-buttons">
          <button
            type="button"
            class="oauth-btn oauth-google"
            (click)="loginWithProvider('google')"
            title="Sign in with Google"
          >
            <span>G</span>
            <span>Google</span>
          </button>
          <button
            type="button"
            class="oauth-btn oauth-github"
            (click)="loginWithProvider('github')"
            title="Sign in with GitHub"
          >
            <span>⚙</span>
            <span>GitHub</span>
          </button>
        </div>

        <!-- Footer Link -->
        <div class="auth-footer">
          <p>Don't have an account? <a routerLink="/register" class="link-primary">Sign up</a></p>
        </div>
      </div>

    <!-- VISUAL SIDE (RIGHT) -->
    <div class="auth-visual">
      <div class="visual-container">
        <div class="visual-gradient"></div>
        <div class="visual-content">
          <div class="visual-icon">🔐</div>
          <h2>Secure & Fast</h2>
          <p>Enterprise-grade security with instant access</p>
        </div>
      </div>
    </div>
  </div>
</div>
