<ng-container *ngIf="!isPublicPage; else publicOutlet">
  <div class="app-layout">

    <app-sidebar></app-sidebar>

    <div class="main-area">
      <app-navbar></app-navbar>
      <main class="page-content">
        <router-outlet></router-outlet>
      </main>
    </div>

  </div>
</ng-container>

<ng-template #publicOutlet>
  <router-outlet></router-outlet>
</ng-template>
