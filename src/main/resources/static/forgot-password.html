<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Kredia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-page">
        <!-- Visual Section (Left) -->
        <div class="auth-visual">
            <div class="auth-visual-logo">
                <img src="/images/logo.png" alt="Kredia">
                <span>Kredia</span>
            </div>

            <div class="auth-visual-content">
                <h2>Security First.<br>Always.</h2>
                <p>Lost your access? Don't worry. Our secure recovery system will guide you back to your financial
                    command center in minutes.</p>
            </div>

            <div class="auth-visual-footer">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Content Section (Right) -->
        <div class="auth-content">
            <a href="/auth/login" class="auth-back-link">
                <span>← Back to Login</span>
            </a>

            <div class="auth-form-wrapper">
                <header class="auth-header">
                    <h3>Recover Password</h3>
                    <p>Enter your email address and we'll send you a secure reset link.</p>
                </header>

                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group-modern">
                        <label for="email">Email address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="input-modern" placeholder="e.g. name@company.com" required>
                        </div>
                    </div>

                    <div id="statusMessage" class="error-message" style="text-align: left; margin-bottom: 24px;"></div>

                    <button type="submit" class="btn-auth">Send Reset Link</button>

                    <p class="auth-footer">
                        Remembered your password? <a href="/auth/login">Sign in here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMessage = document.getElementById('statusMessage');
            const btn = e.target.querySelector('button');

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                statusMessage.innerHTML = `<p style="color: var(--success-color);">${data.message}</p>`;
                e.target.reset();
            } catch (error) {
                statusMessage.innerHTML = `<p style="color: var(--error-color);">An error occurred. Please try again later.</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
