<div class="login-page">
  <div class="login-card">
    <div class="login-top">
      <div class="brand-mark">KREDIA</div>
      <p class="login-heading">Accédez à votre espace Kredia et gérez vos crédits en toute confiance.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="alert error" *ngIf="error">{{ error }}</div>

      <label>
        Email
        <input type="email" formControlName="email" placeholder="admin@kredia.com" autocomplete="email" />
        <small *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Email valide requis.
        </small>
      </label>

      <label>
        Mot de passe
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        <small *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Mot de passe requis (min. 4 caractères).
        </small>
      </label>

      <button type="submit" class="btn primary" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading" class="spinner-wrap">
          <span class="spinner"></span>Connexion...
        </span>
      </button>
    </form>

    <div class="oauth-actions">
      <button type="button" class="btn ghost" (click)="loginWithProvider('google')">Continuer avec Google</button>
      <button type="button" class="btn ghost" (click)="loginWithProvider('github')">Continuer avec GitHub</button>
    </div>

    <div class="login-links">
      <a routerLink="/forgot-password">Mot de passe oublié ?</a>
      <span>•</span>
      <a routerLink="/register">Créer un compte</a>
    </div>
  </div>
</div>
