<div class="auth-page">
  <div class="auth-panel">
    <div class="auth-header">
      <div class="brand">Réinitialiser le mot de passe</div>
      <p>Créez un nouveau mot de passe sécurisé pour votre compte Kredia.</p>
    </div>

    <div class="alert error" *ngIf="error">{{ error }}</div>
    <div class="alert success" *ngIf="success">{{ success }}</div>

    <form *ngIf="!success && !error || !!token" [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label>
        Nouveau mot de passe
        <input type="password" formControlName="password" placeholder="••••••••" />
        <small *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Mot de passe requis (minimum 6 caractères).
        </small>
      </label>

      <label>
        Confirmer le mot de passe
        <input type="password" formControlName="confirmPassword" placeholder="••••••••" />
        <small *ngIf="form.errors?.['passwordMismatch'] && form.touched">
          Les mots de passe doivent correspondre.
        </small>
      </label>

      <button class="btn primary" type="submit" [disabled]="loading">
        {{ loading ? 'Enregistrement...' : 'Réinitialiser' }}
      </button>
    </form>

    <p class="footer-copy">
      Retour à <a routerLink="/login">Connexion</a>
    </p>
  </div>
</div>
