<div class="auth-page">
  <div class="auth-panel">
    <div class="auth-header">
      <div class="brand">Récupération de mot de passe</div>
      <p>Entrez votre email pour recevoir un lien sécurisé de réinitialisation.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="alert error" *ngIf="error">{{ error }}</div>
      <div class="alert success" *ngIf="success">{{ success }}</div>

      <label>
        Email
        <input type="email" formControlName="email" placeholder="email@kredia.com" />
        <small *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Email valide requis.
        </small>
      </label>

      <button class="btn primary" type="submit" [disabled]="loading">
        {{ loading ? 'Envoi en cours...' : 'Recevoir le lien' }}
      </button>
    </form>

    <p class="footer-copy">
      Retour à <a routerLink="/login">Connexion</a>
    </p>
  </div>
</div>
